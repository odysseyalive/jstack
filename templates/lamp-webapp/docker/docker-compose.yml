version: '3.8'

services:
  lamp-webapp:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    container_name: "lamp-webapp-${DOMAIN_SAFE}"
    restart: unless-stopped
    networks:
      - jarvisjr-private
    environment:
      - APACHE_RUN_USER=www-data
      - APACHE_RUN_GROUP=www-data
      - DOMAIN=${DOMAIN}
      - DB_HOST=lamp-database-${DOMAIN_SAFE}
      - DB_NAME=${DB_NAME:-webapp}
      - DB_USER=${DB_USER:-webuser}
      - DB_PASS=${DB_PASS}
    volumes:
      - ../src:/var/www/html:rw
      - ./apache:/etc/apache2/sites-available:ro
    depends_on:
      - lamp-database
    security_opt:
      - no-new-privileges:true
    read_only: false
    user: "www-data"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health.php"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lamp-webapp-${DOMAIN_SAFE}.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.lamp-webapp-${DOMAIN_SAFE}.tls=true"
      - "traefik.http.routers.lamp-webapp-${DOMAIN_SAFE}.tls.certresolver=letsencrypt"
      - "traefik.http.services.lamp-webapp-${DOMAIN_SAFE}.loadbalancer.server.port=80"
      - "com.jarvisjr.template=lamp-webapp"
      - "com.jarvisjr.version=1.0.0"

  lamp-database:
    image: mariadb:10.11
    container_name: "lamp-database-${DOMAIN_SAFE}"
    restart: unless-stopped
    networks:
      - jarvisjr-private
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASS}
      - MYSQL_DATABASE=${DB_NAME:-webapp}
      - MYSQL_USER=${DB_USER:-webuser}
      - MYSQL_PASSWORD=${DB_PASS}
      - MYSQL_CHARSET=utf8mb4
      - MYSQL_COLLATION=utf8mb4_unicode_ci
    volumes:
      - lamp_database_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
      - ./mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    security_opt:
      - no-new-privileges:true
    user: "mysql"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASS}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "com.jarvisjr.template=lamp-webapp"
      - "com.jarvisjr.component=database"

volumes:
  lamp_database_data:
    name: "lamp-database-data-${DOMAIN_SAFE}"
    labels:
      - "com.jarvisjr.template=lamp-webapp"
      - "com.jarvisjr.component=database"

networks:
  jarvisjr-private:
    external: true