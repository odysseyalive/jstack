server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';";

    # Rate limiting
    limit_req zone=static burst=60 nodelay;
    limit_req_status 429;

    # Main location
    location / {
        try_files $uri $uri/ =404;
        
        # Cache HTML files for 1 hour
        location ~* \\.html$ {
            expires 1h;
            add_header Cache-Control "public";
        }
    }

    # Static assets caching
    location ~* \\.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # XML and JSON files
    location ~* \\.(xml|json)$ {
        expires 1h;
        add_header Cache-Control "public";
    }

    # Favicon
    location = /favicon.ico {
        expires 1d;
        access_log off;
    }

    # Robots.txt
    location = /robots.txt {
        expires 1d;
        access_log off;
    }

    # Block access to hidden files
    location ~ /\\. {
        deny all;
    }

    # Block access to backup files
    location ~* \\.(bak|config|sql|fla|psd|ini|log|sh|inc|swp|dist)$ {
        deny all;
    }

    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}